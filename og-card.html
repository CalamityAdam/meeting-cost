<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(circle at 30% 20%, #1e293b 0%, #0f172a 60%, #020617 100%);
    color: #f8fafc;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 80px;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 85% 85%, rgba(34, 211, 238, 0.16) 0%, transparent 40%),
      radial-gradient(circle at 15% 90%, rgba(239, 68, 68, 0.10) 0%, transparent 35%);
    pointer-events: none;
  }

  .label {
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #94a3b8;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .cost {
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 168px;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    color: #fca5a5;
    text-shadow: 0 0 50px rgba(239, 68, 68, 0.45);
    margin-bottom: 14px;
    font-variant-numeric: tabular-nums;
  }
  .timer {
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 26px;
    color: #94a3b8;
    margin-bottom: 38px;
    letter-spacing: 0.04em;
  }

  h1 {
    font-size: 72px;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 14px;
    background: linear-gradient(135deg, #f8fafc 0%, #22d3ee 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .tagline {
    font-size: 26px;
    color: #cbd5e1;
    margin-bottom: 30px;
    text-align: center;
  }

  .pills {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }
  .pill {
    padding: 10px 22px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 999px;
    font-size: 18px;
    font-weight: 600;
    color: #cbd5e1;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .pill.accent {
    background: rgba(34, 211, 238, 0.12);
    border-color: rgba(34, 211, 238, 0.4);
    color: #67e8f9;
  }

  .url {
    position: absolute;
    bottom: 36px;
    right: 48px;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 22px;
    color: #94a3b8;
    letter-spacing: 0.05em;
  }
  .emoji-flair {
    position: absolute;
    top: 40px;
    left: 48px;
    font-size: 64px;
  }
  .badge {
    position: absolute;
    top: 48px;
    right: 48px;
    font-size: 16px;
    color: #94a3b8;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="emoji-flair">💸</div>
  <div class="badge">Free · Open source · No tracking</div>

  <div class="label">Your meeting · 12:34 in</div>
  <div class="cost">$1,247.83</div>

  <h1>Meeting Cost Calculator</h1>
  <div class="tagline">Watch your meeting burn money in real time.</div>

  <div class="pills">
    <div class="pill accent">✏️ Set your rate</div>
    <div class="pill">👥 Build by attendee</div>
    <div class="pill">🔗 Share the bill</div>
  </div>

  <div class="url">lesstalk.ing</div>
</body>
</html>
