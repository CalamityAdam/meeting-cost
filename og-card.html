<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>og-card · lesstalk.ing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Archivo", system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #f8fafc;
    width: 1200px;
    height: 630px;
    position: relative;
    overflow: hidden;
  }

  /* Subtle ambient glow — keeps the canvas alive but doesn't compete with the mark */
  body::before {
    content: '';
    position: absolute;
    width: 900px;
    height: 900px;
    left: -200px;
    top: -300px;
    background: radial-gradient(circle, rgba(251, 191, 36, 0.10) 0%, transparent 60%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    width: 700px;
    height: 700px;
    right: -150px;
    bottom: -250px;
    background: radial-gradient(circle, rgba(239, 68, 68, 0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  /* faint dotted grid for texture */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  .frame {
    position: relative;
    width: 100%;
    height: 100%;
    padding: 64px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* === Top bar === */
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 2;
  }
  .domain {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: #94a3b8;
  }
  .domain b { color: #fbbf24; font-weight: 700; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    color: #94a3b8;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .badge::before {
    content: '';
    width: 8px; height: 8px;
    background: #22d3ee;
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(34, 211, 238, 0.7);
  }

  /* === Hero lockup === */
  .lockup {
    display: flex;
    align-items: center;
    gap: 56px;
    z-index: 2;
  }

  .mark {
    display: inline-flex;
    align-items: flex-end;
    flex: 0 0 auto;
    line-height: 0.78;
  }
  .mark .dollar {
    font-family: "Archivo", system-ui, sans-serif;
    font-weight: 900;
    font-size: 360px;
    color: #fbbf24;
    letter-spacing: -0.04em;
    line-height: 0.78;
    /* tiny optical nudge */
    margin-right: 14px;
  }
  .mark .dot {
    width: 50px;
    height: 50px;
    background: #fbbf24;
    margin-bottom: 14px;
    flex: 0 0 auto;
  }

  .copy {
    flex: 1 1 auto;
    min-width: 0;
  }
  .eyebrow {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 16px;
    font-weight: 500;
    color: #fbbf24;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .headline {
    font-family: "Archivo", sans-serif;
    font-size: 76px;
    font-weight: 800;
    line-height: 0.96;
    letter-spacing: -0.035em;
    color: #f8fafc;
    text-wrap: balance;
  }
  .headline em {
    font-style: normal;
    color: #fbbf24;
  }
  .sub {
    margin-top: 20px;
    font-size: 24px;
    line-height: 1.35;
    color: #94a3b8;
    font-weight: 500;
    max-width: 28ch;
    text-wrap: balance;
  }

  /* === Bottom strip — live cost ticker === */
  .ticker {
    display: flex;
    align-items: center;
    gap: 24px;
    z-index: 2;
    padding: 18px 24px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    backdrop-filter: blur(8px);
    width: fit-content;
  }
  .ticker .label {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 13px;
    font-weight: 500;
    color: #94a3b8;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .ticker .divider {
    width: 1px;
    height: 36px;
    background: rgba(255, 255, 255, 0.12);
  }
  .ticker .amount {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 36px;
    font-weight: 700;
    color: #fca5a5;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 24px rgba(239, 68, 68, 0.4);
  }
  .ticker .time {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 16px;
    font-weight: 500;
    color: #94a3b8;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
  }
  .ticker .pulse {
    width: 10px; height: 10px;
    background: #ef4444;
    border-radius: 50%;
    box-shadow: 0 0 14px rgba(239, 68, 68, 0.8);
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="frame">

    <div class="top">
      <div class="domain"><b>lesstalk</b>.ing</div>
      <div class="badge">Free · No tracking</div>
    </div>

    <div class="lockup">
      <div class="mark">
        <span class="dollar">$</span>
        <span class="dot"></span>
      </div>
      <div class="copy">
        <div class="eyebrow">Meeting cost calculator</div>
        <div class="headline">Your meeting is <em>burning money.</em></div>
        <div class="sub">Watch the dollars climb in real time.</div>
      </div>
    </div>

    <div class="ticker">
      <div class="pulse"></div>
      <div class="label">Live</div>
      <div class="divider"></div>
      <div class="amount">$1,247.83</div>
      <div class="divider"></div>
      <div class="time">12:34 elapsed</div>
    </div>

  </div>
</body>
</html>
